<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光計畫 - The Glimmer</title>
    <!-- 引入美觀的字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #e2c08d;
            --soft-blue: #eef2f7;
            --deep-gray: #2c3e50;
            --accent-glow: rgba(226, 192, 141, 0.3);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.8;
            color: #444;
            margin: 0;
            /* 柔和的漸層背景，模擬清晨的光線 */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-attachment: fixed;
        }

        header {
            padding: 100px 20px 60px;
            text-align: center;
            background: transparent;
        }

        h1 {
            font-family: 'Noto Serif TC', serif;
            color: var(--deep-gray);
            font-size: 3em;
            letter-spacing: 4px;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 25%;
            width: 50%;
            height: 2px;
            background: var(--primary-gold);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .subtitle {
            font-weight: 300;
            color: #7f8c8d;
            font-size: 1.1em;
            margin-top: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 毛玻璃質感的卡片設計 */
        .content-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 40px;
            transition: transform 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-family: 'Noto Serif TC', serif;
            color: var(--primary-gold);
            font-size: 1.8em;
            border-left: 4px solid var(--primary-gold);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        p {
            font-size: 1.05em;
            color: #555;
            text-align: justify;
        }

        /* AI 區塊改為優雅的點綴 */
        .ai-section {
            background: rgba(226, 192, 141, 0.1);
            border: 1px dashed var(--primary-gold);
            padding: 25px;
            border-radius: 15px;
            font-size: 0.95em;
        }

        .ai-tag {
            background: var(--primary-gold);
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-right: 5px;
        }

        footer {
            text-align: center;
            padding: 60px;
            color: #bdc3c7;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        /* 簡單的淡入動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container > * {
            animation: fadeIn 1s ease forwards;
        }
    </style>
</head>
<body>

<header>
    <h1>微光計畫</h1>
    <p class="subtitle">The Glimmer: 在數位世界遇見溫暖與福音的喜樂</p>
</header>

<div class="container">
    <div class="content-card">
        <h2>💡 創作理念</h2>
        <p>
            在這個快速變動、資訊碎片化的數位時代，我們往往在網路的喧囂中迷失了方向。
            <strong>「微光計畫」</strong>的初衷，是希望透過行動網路傳遞一份純真、善良與美好。
            我們深信，網路不應只是冰冷的代碼，而能成為分享基督福音、傳遞溫暖愛意的出口，
            讓每個疲憊的心靈在點擊進入這個角落時，都能感受到平靜與希望。
        </p>
    </div>

    <div class="content-card">
        <h2>🎨 數位作品：每日恩典</h2>
        <p>
            「喜樂的心乃是良藥。」—— 我們將日常中的美好瞬間轉化為數位藝術。
            透過精心挑選的色彩與構圖，我們試圖捕捉生活中細微的恩典。
